<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agita Lane - Premium</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="app-container">
        <header class="hero-banner">
            <img src="img/banner.jpg" alt="banner Agita Lane" class="banner-image">
            <div class="banner-content">
                <h1></h1>
                <p style="color: #ffcc00; font-weight: bold; text-shadow: 1px 1px 2px #000;"></p>
            </div>
        </header>

        <section class="card">
            <div class="card-header">
                <span class="step">1</span>
                <h2>Escolha o Tamanho</h2>
            </div>
            <div id="tamanho-list" class="grid-options"></div>

            <div class="card-header">
                <span class="step">2</span>
                <h2>Adicione os Cremes</h2>
            </div>
            <div id="cremes-list" class="grid-checkbox"></div>

            <div class="card-header">
                <span class="step">3</span>
                <h2>Sabor da Batida</h2>
            </div>
            <div class="grid-options">
                <button class="opt-batida" onclick="setBatida('Paçoca', this)">Paçoca</button>
                <button class="opt-batida" onclick="setBatida('Morango', this)">Morango</button>
                <button class="opt-batida" onclick="setBatida('Banana', this)">Banana</button>
                <button class="opt-batida" onclick="setBatida('Nenhuma', this)">Sem Batida</button>
            </div>
        </section>

        <section class="card cart-box">
            <div class="card-header">
                <span class="step">4</span>
                <h2>Seu Pedido</h2>
            </div>
            <div id="display-order" class="summary-box">
                Escolha seus itens...
            </div>

            <div class="card-header" style="margin-top: 20px;">
                <span class="step">5</span>
                <h2>Finalizar Pedido</h2>
            </div>

            <div class="checkout-fields">
                <input type="text" id="nome-cliente" placeholder="Digite seu Nome..." required>
                <input type="text" id="endereco-cliente" placeholder="Endereço Completo (Rua, Nº, Bairro)..." required>
                <select id="metodo-pagamento">
                    <option value="Pix">Pix</option>
                    <option value="Cartão">Cartão</option>
                    <option value="Dinheiro">Dinheiro</option>
                </select>
            </div>
        </section>
    </div> <div id="admin-panel" class="admin-modal" style="display:none;">
        <div class="admin-content" style="max-height: 80vh; overflow-y: auto;">
            <span class="close" onclick="fecharAdmin()">&times;</span>
            <h2 style="color: #4b0082;">Painel Agita Lane</h2>

            <div class="admin-section">
                <h4>📦 Novo Tamanho</h4>
                <input type="text" id="new-prod-name-admin" placeholder="Ex: Açaí 700ml">
                <input type="number" id="new-prod-price-admin" placeholder="Preço">
                <input type="text" id="new-prod-img-admin" placeholder="img/700ml.png">
                <button class="btn-add" onclick="adicionarNovoTamanho()">Cadastrar</button>
            </div>

            <div class="admin-section">
                <h4>🍦 Novo Creme</h4>
                <input type="text" id="new-creme-name-admin" placeholder="Ex: Creme de Avelã">
                <button class="btn-add" onclick="adicionarNovoCreme()">Cadastrar</button>
            </div>

            <hr style="margin:20px 0;">
            <div id="lista-exclusao-tamanhos" style="text-align:left; font-size: 14px; margin-bottom: 20px;"></div>
            <div id="lista-exclusao-cremes" style="text-align:left; font-size: 14px;"></div>
        </div>
    </div>

    <button class="btn-floating-whatsapp" onclick="finalizeOrder()" title="Finalizar Pedido">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp Logo">
        <span>Pedir Agora</span>
    </button>

    <button class="btn-floating-admin" onclick="abrirAdmin()" title="Administração">⚙️</button>

    <footer class="footer-container">
        <div class="footer-content">
            <p>&copy; 2026 Agita Lane. Todos os direitos reservados.</p>
            <p class="dev-signature">
                &lt;/&gt; Desenvolvido por 
                <a href="https://wa.me/5575982769801" target="_blank">Ademir</a>
            </p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
